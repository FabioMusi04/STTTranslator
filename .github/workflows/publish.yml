name: Publish to CurseForge

on:
  workflow_dispatch:  # Esecuzione manuale
  push:
    tags:
      - 'v*'  # Pubblica quando effettui un tag v*

env:
  MINECRAFT_VERSION: 1.21.1
  JAVA_VERSION: 21
  CHANGELOG_FILE: CHANGELOG.md

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Extract Version from Gradle
        id: gradle_version
        shell: bash
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Version from Tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # CurseForge Configuration
          curseforge-id: ${{ secrets.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # GitHub Configuration
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}

          # Metadata
          name: "STT Translator ${{ steps.tag_version.outputs.VERSION || steps.gradle_version.outputs.VERSION }}"
          version: ${{ steps.tag_version.outputs.VERSION || steps.gradle_version.outputs.VERSION }}
          version-type: release
          changelog-file: ${{ env.CHANGELOG_FILE }}

          # Mod Configuration
          loaders: forge
          game-versions: ${{ env.MINECRAFT_VERSION }}
          java: ${{ env.JAVA_VERSION }}
